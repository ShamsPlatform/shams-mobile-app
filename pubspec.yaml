name: shams_mobile_app
description: "Shams Platform - A production-ready Flutter application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Localizations (required for Arabic RTL support)
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.4

  # State Management
  provider: ^6.1.2

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/post image.png
    - assets/images/logo/shams texial logo for light mode.png
    - assets/images/logo/shams logo.png
    - assets/images/logo/shams texial logo light mode.png
    - assets/images/logo/shams texial logo for light mode small height.png
    # - assets/icons/
